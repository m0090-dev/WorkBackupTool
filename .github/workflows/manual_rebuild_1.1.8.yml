
name: "Manual Rebuild v1.1.8"

on:
  workflow_dispatch: # GitHubのActionsタブから手動で実行できるようにする

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      # ★ ここで 1.1.8 の最終地点であるコミットハッシュを指定してチェックアウトします
      - uses: actions/checkout@v4
        with:
          ref: '9f7c683'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: sync version to config
        run: python scripts/update_version.py

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # タグ名とリリース名を 1.1.8 に固定
          tagName: v1.1.8
          releaseName: "WorkBackupTool v1.1.8"
          releaseBody: "Re-build from commit 9f7c683 (Fixed previous tag issue)"
          releaseDraft: true # 最初は下書きで作られるので安心です
          prerelease: false
