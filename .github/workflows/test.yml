name: "Rust Tests"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # 開発環境に合わせてOSを選択
        platform: [windows-latest, macos-latest, ubuntu-22.04]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: install frontend dependencies
        # フロントエンドのビルドが必要なテスト（tauriコマンド等）がある場合に備えて
        run: npm install

      - name: build frontend
        # Tauriのビルドプロセスを通さないため、手動でフロントエンドをビルドしておく
        run: npm run build

      - name: run cargo test
        # --nocapture を付けて標準出力を確認できるように設定
        # src-tauri ディレクトリに移動して実行
        working-directory: ./src-tauri
        run: cargo test -- --nocapture
